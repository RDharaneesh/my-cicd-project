<!DOCTYPE html>
<html>
<head>
<title>Microservices Dashboard</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  text-align: center;
  margin: 0;
}

h1 {
  padding: 20px;
}

.container {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
}

.card {
  width: 220px;
  padding: 20px;
  margin: 15px;
  border-radius: 15px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  transition: 0.3s;
  box-shadow: 0 0 15px rgba(0,0,0,0.3);
}

.card:hover {
  transform: scale(1.05);
}

.status {
  font-size: 20px;
  margin-top: 10px;
}

.up {
  border-left: 5px solid #00ff88;
}

.down {
  border-left: 5px solid #ff4d4d;
}

button {
  padding: 12px 20px;
  border: none;
  border-radius: 8px;
  background: #00c6ff;
  color: black;
  font-weight: bold;
  cursor: pointer;
  margin: 20px;
}

button:hover {
  background: #0072ff;
  color: white;
}
</style>
</head>

<body>

<h1>🚀 Microservices Dashboard</h1>

<div class="container">

  <div class="card" id="service1">
    <h3>👤 User Service</h3>
    <p class="status">Loading...</p>
  </div>

  <div class="card" id="service2">
    <h3>📦 Order Service</h3>
    <p class="status">Loading...</p>
  </div>

  <div class="card" id="service3">
    <h3>💳 Payment Service</h3>
    <p class="status">Loading...</p>
  </div>

</div>

<button onclick="checkServices()">🔄 Refresh</button>

<script>
function checkServices() {
  fetch('/status')
    .then(res => res.json())
    .then(data => {
      update('service1', data.user);
      update('service2', data.order);
      update('service3', data.payment);
    })
    .catch(() => {
      alert("Backend not reachable!");
    });
}

function update(id, status) {
  const card = document.getElementById(id);
  const text = card.querySelector(".status");

  if(status === "UP"){
    text.innerHTML = "🟢 UP";
    card.className = "card up";
  } else {
    text.innerHTML = "🔴 DOWN";
    card.className = "card down";
  }
}

// Auto refresh every 5 seconds
setInterval(checkServices, 5000);
</script>

</body>
</html>
