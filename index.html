<!DOCTYPE html>
<html>
<head>
<title>Microservices Dashboard</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: white;
}

/* Navbar */
.navbar {
  background: #020617;
  padding: 15px;
  font-size: 20px;
  font-weight: bold;
  text-align: center;
}

/* Stats */
.stats {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin: 20px;
}

.stat-box {
  background: #1e293b;
  padding: 15px 25px;
  border-radius: 10px;
}

/* Cards */
.container {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
}

.card {
  width: 230px;
  padding: 20px;
  margin: 15px;
  border-radius: 15px;
  background: #1e293b;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

/* Status */
.status {
  font-size: 18px;
  margin-top: 10px;
}

.up {
  border-left: 5px solid #22c55e;
}

.down {
  border-left: 5px solid #ef4444;
}

/* Dot animation */
.dot {
  height: 10px;
  width: 10px;
  border-radius: 50%;
  display: inline-block;
  margin-right: 8px;
}

.green {
  background: #22c55e;
  animation: pulse 1s infinite;
}

.red {
  background: #ef4444;
}

@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(34,197,94,0.7); }
  70% { box-shadow: 0 0 0 10px rgba(34,197,94,0); }
  100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
}

/* Button */
button {
  display: block;
  margin: 20px auto;
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  background: #38bdf8;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #0ea5e9;
}

/* Footer */
.footer {
  text-align: center;
  margin: 20px;
  color: #94a3b8;
}
</style>
</head>

<body>

<div class="navbar">🚀 Microservices Monitoring Dashboard</div>

<div class="stats">
  <div class="stat-box">Total: 3</div>
  <div class="stat-box">UP: <span id="upCount">0</span></div>
  <div class="stat-box">DOWN: <span id="downCount">0</span></div>
</div>

<div class="container">

  <div class="card" id="service1">
    <h3>👤 User Service</h3>
    <p class="status">Loading...</p>
  </div>

  <div class="card" id="service2">
    <h3>📦 Order Service</h3>
    <p class="status">Loading...</p>
  </div>

  <div class="card" id="service3">
    <h3>💳 Payment Service</h3>
    <p class="status">Loading...</p>
  </div>

</div>

<button onclick="checkServices()">🔄 Refresh</button>

<div class="footer">
  Last Updated: <span id="time">--</span>
</div>

<script>
// Random status generator
function randomStatus() {
  return Math.random() > 0.5 ? "UP" : "DOWN";
}

// Main function
function checkServices() {

  const data = {
    user: randomStatus(),
    order: randomStatus(),
    payment: randomStatus()
  };

  let up = 0, down = 0;

  update('service1', data.user);
  update('service2', data.order);
  update('service3', data.payment);

  Object.values(data).forEach(s => {
    if(s === "UP") up++;
    else down++;
  });

  document.getElementById("upCount").innerText = up;
  document.getElementById("downCount").innerText = down;
  document.getElementById("time").innerText = new Date().toLocaleTimeString();
}

// Update UI
function update(id, status) {
  const card = document.getElementById(id);
  const text = card.querySelector(".status");

  if(status === "UP"){
    text.innerHTML = '<span class="dot green"></span> UP';
    card.className = "card up";
  } else {
    text.innerHTML = '<span class="dot red"></span> DOWN';
    card.className = "card down";
  }
}

// Auto refresh every 5 seconds
setInterval(checkServices, 5000);

// Initial load
checkServices();
</script>

</body>
</html>
