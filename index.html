<!DOCTYPE html>
<html>
<head>
<title>Microservice Monitor</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
}

h1 {
  margin-top: 20px;
}

.box {
  display: inline-block;
  width: 200px;
  padding: 15px;
  margin: 15px;
  border-radius: 10px;
}

.up { background: green; }
.down { background: red; }

button {
  padding: 10px;
  margin-top: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>Microservice Status</h1>

<div class="box" id="service1">
  <h3>User Service</h3>
  <p>Status: <span>Loading...</span></p>
</div>

<div class="box" id="service2">
  <h3>Order Service</h3>
  <p>Status: <span>Loading...</span></p>
</div>

<div class="box" id="service3">
  <h3>Payment Service</h3>
  <p>Status: <span>Loading...</span></p>
</div>

<br>
<button onclick="checkServices()">Check Status</button>

<script>
function checkServices() {
  fetch('/status')
    .then(res => res.json())
    .then(data => {
      update('service1', data.user);
      update('service2', data.order);
      update('service3', data.payment);
    });
}

function update(id, status) {
  const box = document.getElementById(id);
  const span = box.querySelector("span");

  span.innerText = status;

  if(status === "UP"){
    box.className = "box up";
  } else {
    box.className = "box down";
  }
}
</script>

</body>
</html>
