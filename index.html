<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Microservice Auto Analysis</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #0f172a;
  color: white;
}

header {
  background: #1e293b;
  padding: 15px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}

.container {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.3);
}

.status {
  padding: 5px 10px;
  border-radius: 5px;
  display: inline-block;
  font-size: 12px;
}

.up { background: green; }
.down { background: red; }
.warning { background: orange; }

.logs {
  grid-column: span 3;
  background: #111827;
  padding: 15px;
  border-radius: 10px;
  height: 200px;
  overflow-y: auto;
  font-family: monospace;
}

</style>
</head>

<body>

<header>
Microservice Auto Analysis Dashboard 🚀
</header>

<div class="container">

  <div class="card">
    <h3>User Service</h3>
    <span class="status up">UP</span>
    <p>CPU: 45%</p>
    <p>Requests: 1200/min</p>
  </div>

  <div class="card">
    <h3>Order Service</h3>
    <span class="status warning">HIGH LOAD</span>
    <p>CPU: 78%</p>
    <p>Requests: 2400/min</p>
  </div>

  <div class="card">
    <h3>Payment Service</h3>
    <span class="status down">DOWN</span>
    <p>Error Rate: 90%</p>
    <p>Last Check: Failed</p>
  </div>

  <div class="logs" id="logs">
    <b>System Logs:</b><br>
  </div>

</div>

<script>
const logs = document.getElementById("logs");

const messages = [
  "Checking User Service...",
  "User Service OK ✔",
  "Checking Order Service...",
  "Order Service HIGH LOAD ⚠",
  "Checking Payment Service...",
  "Payment Service DOWN ❌",
  "Auto healing triggered...",
  "Restarting Payment Service..."
];

let i = 0;

setInterval(() => {
  if(i < messages.length){
    logs.innerHTML += messages[i] + "<br>";
    logs.scrollTop = logs.scrollHeight;
    i++;
  }
}, 1500);
</script>

</body>
</html>
